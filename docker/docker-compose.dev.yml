name: catcheye-guard
services:
  # [개발 모드]
  catcheye-guard-dev:
    extends:
      file: docker-compose.base.yml
      service: robot-base
    image: ghcr.io/itschurry/catcheye-guard:develop
    container_name: catcheye-guard-develop
    working_dir: $HOME/catcheye-guard
    environment:
      - BUILD_TYPE=develop
      - GST_PLUGIN_PATH=/usr/local/lib/aarch64-linux-gnu/gstreamer-1.0:$GST_PLUGIN_PATH
    volumes:
      # 호스트의 현재 폴더(./)를 컨테이너의 작업 폴더로 마운트 (코드 수정 반영)
      # - ./:/home/${USER:-appuser}/ros_ws:rw
      - ../:$HOME/catcheye-guard:rw
      - /dev:/dev:rw
      - /run/udev:/run/udev:ro
      - $HOME/shared:/mnt/shared:rw
      - $HOME/.ssh:/home/user/.ssh:ro
      - $HOME/.ssh/known_hosts:/home/user/.ssh/known_hosts:rw
      # VS Code 서버와 확장 프로그램을 저장할 영구 볼륨
      - vscode_server:/home/user/.vscode-server:rw
      - vscode_server_ext:/home/user/.vscode-server/extensions:rw
      - vscode_server_data:/home/user/.vscode-server/data:rw

    command: bash
    stdin_open: true
    tty: true
    privileged: true

volumes:
  vscode_server:
  vscode_server_ext:
  vscode_server_data:
