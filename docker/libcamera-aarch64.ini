[binaries]
c = '/usr/bin/aarch64-linux-gnu-gcc-13'
cpp = '/usr/bin/aarch64-linux-gnu-g++-13'
ar = '/usr/bin/aarch64-linux-gnu-ar'
strip = '/usr/bin/aarch64-linux-gnu-strip'
pkg-config = '/usr/bin/pkg-config'
python = '/usr/bin/python3'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'

[properties]
sys_root = '/opt/sysroots/raspi'
pkg_config_libdir = ['/opt/sysroots/raspi/usr/lib/aarch64-linux-gnu/pkgconfig', '/opt/sysroots/raspi/usr/share/pkgconfig']

[built-in options]
c_args = ['--sysroot=/opt/sysroots/raspi']
cpp_args = ['--sysroot=/opt/sysroots/raspi']
c_link_args = ['--sysroot=/opt/sysroots/raspi']
cpp_link_args = ['--sysroot=/opt/sysroots/raspi']
